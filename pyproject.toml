[project]
name = "okx-quant-mvp"
version = "0.5.25"
description = "Desktop MVP for OKX EMA signal trading with ATR-based TP/SL"
requires-python = ">=3.11"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["okx_quant*"]
exclude = ["tests*", "tests_artifacts*"]

